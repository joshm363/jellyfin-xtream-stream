<!DOCTYPE html>
<html>
<head>
    <title>Dispatcharr VOD</title>
</head>
<body>
    <div id="DispatcharrConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <form id="DispatcharrConfigForm">
                    <div class="verticalSection">
                        <h2>Dispatcharr VOD Search</h2>
                        <p>Search Dispatcharr's VOD catalog directly and play titles on demand &mdash; no library sync required.</p>
                    </div>

                    <div class="inputContainer">
                        <input id="DispatcharrUrl" name="DispatcharrUrl" type="text" is="emby-input" label="Dispatcharr URL (e.g. http://192.168.1.50:9191)" />
                        <div class="fieldDescription">No trailing slash.</div>
                    </div>

                    <div class="inputContainer">
                        <input id="ApiKey" name="ApiKey" type="text" is="emby-input" label="Dispatcharr API Key (admin-scoped)" />
                        <div class="fieldDescription">Generated in Dispatcharr under user settings &gt; API &amp; XC tab. Sent as an Authorization: ApiKey header.</div>
                    </div>

                    <div class="inputContainer">
                        <input id="XtreamUsername" name="XtreamUsername" type="text" is="emby-input" label="XC Username (optional fallback)" />
                    </div>

                    <div class="inputContainer">
                        <input id="XtreamPassword" name="XtreamPassword" type="password" is="emby-input" label="XC Password (optional fallback)" />
                    </div>

                    <div class="inputContainer">
                        <input id="MaxSearchResults" name="MaxSearchResults" type="number" is="emby-input" label="Max search results per query" min="1" max="100" />
                    </div>

                    <div class="inputContainer">
                        <input id="RequestTimeoutSeconds" name="RequestTimeoutSeconds" type="number" is="emby-input" label="Request timeout (seconds)" min="1" max="60" />
                    </div>

                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block">
                            <span>Save</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        var DispatcharrPluginId = "f1e1a8c0-9b1d-4f6a-9e3a-6c1d2b8a7e10";

        (function () {
            var pageId = "DispatcharrConfigPage";

            function getPage() {
                return document.querySelector("#" + pageId);
            }

            document.querySelector("#DispatcharrConfigPage").addEventListener("pageshow", function () {
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(DispatcharrPluginId).then(function (config) {
                    var page = getPage();
                    page.querySelector("#DispatcharrUrl").value = config.DispatcharrUrl || "";
                    page.querySelector("#ApiKey").value = config.ApiKey || "";
                    page.querySelector("#XtreamUsername").value = config.XtreamUsername || "";
                    page.querySelector("#XtreamPassword").value = config.XtreamPassword || "";
                    page.querySelector("#MaxSearchResults").value = config.MaxSearchResults || 25;
                    page.querySelector("#RequestTimeoutSeconds").value = config.RequestTimeoutSeconds || 10;
                    Dashboard.hideLoadingMsg();
                });
            });

            document.querySelector("#DispatcharrConfigForm").addEventListener("submit", function (e) {
                e.preventDefault();
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(DispatcharrPluginId).then(function (config) {
                    var page = getPage();
                    config.DispatcharrUrl = page.querySelector("#DispatcharrUrl").value.replace(/\/+$/, "");
                    config.ApiKey = page.querySelector("#ApiKey").value;
                    config.XtreamUsername = page.querySelector("#XtreamUsername").value;
                    config.XtreamPassword = page.querySelector("#XtreamPassword").value;
                    config.MaxSearchResults = parseInt(page.querySelector("#MaxSearchResults").value, 10) || 25;
                    config.RequestTimeoutSeconds = parseInt(page.querySelector("#RequestTimeoutSeconds").value, 10) || 10;

                    ApiClient.updatePluginConfiguration(DispatcharrPluginId, config).then(function (result) {
                        Dashboard.processPluginConfigurationUpdateResult(result);
                    });
                });
                return false;
            });
        })();
    </script>
</body>
</html>
